services:
  inayanbuilderbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inayanbuilderbot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./.data:/app/.data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health | grep -q '\"ok\":true'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
